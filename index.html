<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>مساعد الطالب - جامعة القصيم</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f9fafe;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem;
    }
    h1 {
      color: #1e3a8a;
    }
    input, button {
      padding: 0.75rem;
      margin-top: 1rem;
      width: 100%;
      max-width: 400px;
      border: 1px solid #ccc;
      border-radius: 8px;
      font-size: 1rem;
    }
    button {
      background-color: #2563eb;
      color: white;
      border: none;
      cursor: pointer;
    }
    button:hover {
      background-color: #1e40af;
    }
    #response {
      margin-top: 1.5rem;
      background-color: #e2e8f0;
      padding: 1rem;
      border-radius: 8px;
      width: 100%;
      max-width: 400px;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>مساعد الطالب الذكي - جامعة القصيم</h1>
  <input type="text" id="question" placeholder="اكتب سؤالك هنا...">
  <button onclick="askBot()">إرسال</button>
  <div id="response"></div>

  <script>
    async function askBot() {
      const question = document.getElementById('question').value;
      const responseDiv = document.getElementById('response');
      responseDiv.textContent = 'جارٍ المعالجة...';

      try {
        const res = await fetch('http://localhost:3000/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ question })
        });
        const data = await res.json();
        responseDiv.textContent = data.answer || 'لا يوجد رد حالياً.';
      } catch (error) {
        responseDiv.textContent = 'حدث خطأ في الاتصال بالخادم.';
      }
    }
  </script>
</body>
</html>
